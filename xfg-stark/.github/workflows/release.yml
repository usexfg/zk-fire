name: Release Build

on:
  push:
    branches: [ cold-starks, main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ cold-starks, main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build xfg-stark-cli
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --bin xfg-stark-cli

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: xfg-stark-cli-linux-x86_64
          path: target/release/xfg-stark-cli
          retention-days: 30

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --bin xfg-stark-cli

      - name: Create release archive
        run: |
          cd target/release
          tar -czf xfg-stark-cli-${{ github.ref_name }}-linux-x86_64.tar.gz xfg-stark-cli

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/xfg-stark-cli-${{ github.ref_name }}-linux-x86_64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
