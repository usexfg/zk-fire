name: Release Fuego Prover
on:
  push:
    tags:
      - 'fuego-v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: fuego-prover-linux
            fuego_binary: fuego-prover-cli
            tui_binary: claim-tui
          - os: macos-latest
            artifact_name: fuego-prover-macos
            fuego_binary: fuego-prover-cli
            tui_binary: claim-tui
          - os: windows-latest
            artifact_name: fuego-prover-windows
            fuego_binary: fuego-prover-cli.exe
            tui_binary: claim-tui.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          fuego-prover/target
        key: ${{ runner.os }}-cargo-fuego-${{ hashFiles('fuego-prover/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-fuego-

    - name: Build Fuego Prover CLI and Claim TUI
      run: |
        cd fuego-prover
        cargo build -p fuego-prover-cli --release
        cargo build -p claim-tui --release
      shell: bash

    - name: Create distribution package
      run: |
        mkdir -p dist
        cp fuego-prover/target/release/${{ matrix.fuego_binary }} dist/
        cp fuego-prover/target/release/${{ matrix.tui_binary }} dist/

        # Create archive
        cd dist
        tar -czf ../${{ matrix.artifact_name }}.tar.gz .
        if [ "$RUNNER_OS" = "Windows" ]; then
          powershell Compress-Archive -Path * -DestinationPath ../${{ matrix.artifact_name }}.zip
        else
          zip -r ../${{ matrix.artifact_name }}.zip .
        fi
        cd ..
      shell: bash

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          ${{ matrix.artifact_name }}.tar.gz
          ${{ matrix.artifact_name }}.zip

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
